<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff6f47" />
<title>Gal · Landing Pages</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#ff6f47; --coral-deep:#e6492a; --gold:#ffce5c;
    --teal:#2fa6a3; --leaf:#1f7a4d;
    --dusk:#6a3f6c; --ink:#25151f; --cream:#fff6ec;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:"Heebo",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 60% at 50% 0%,#ffd6a8 0%,#ffb286 22%,#ff8a64 42%,#ff6f47 60%,#c8506b 80%,#5b2a59 100%);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .wrap{
    max-width:560px; width:100%;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border:1px solid rgba(255,255,255,.7);
    border-radius:28px;
    padding:32px 26px;
    box-shadow:0 30px 80px rgba(58,31,63,.25);
    text-align:center;
  }
  h1{
    font-family:"Pacifico",cursive;
    font-size:clamp(32px,8vw,44px);
    margin:0 0 6px;
    background:linear-gradient(135deg,var(--coral),var(--dusk));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{ color:#4b2f3a; opacity:.8; margin-bottom:24px; font-size:15px;}
  .section{ margin-top:22px; text-align:right;}
  .section:first-of-type{ margin-top:0;}
  .section-h{
    display:flex; align-items:center; gap:10px;
    font-size:14px; font-weight:900; letter-spacing:.5px;
    text-transform:uppercase; color:var(--ink); opacity:.8;
    margin:0 4px 10px;
  }
  .section-h .dot{
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(135deg,var(--coral),var(--gold));
  }
  .section--biz .section-h .dot{
    background:linear-gradient(135deg,var(--teal),var(--leaf));
  }
  ul{list-style:none; padding:0; margin:0; display:grid; gap:10px;}
  a.card{
    display:flex; align-items:center; justify-content:space-between;
    text-decoration:none;
    background:linear-gradient(160deg,#fff 0%,#fff4e3 100%);
    border:1px solid rgba(255,178,134,.55);
    border-radius:20px; padding:14px 16px; color:var(--ink);
    box-shadow:0 6px 18px rgba(58,31,63,.10);
    transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
  }
  a.card:hover{ transform:translateY(-3px); box-shadow:0 14px 40px rgba(58,31,63,.18);}
  .section--biz a.card{
    background:linear-gradient(160deg,#fff 0%,#e8faf7 100%);
    border-color:rgba(111,214,207,.55);
  }
  .card .t{ font-weight:900; font-size:16px; line-height:1.3; flex:1 1 auto; min-width:0;}
  .card .t small{ display:block; font-weight:500; font-size:12px; opacity:.7; margin-top:2px;}
  .card .arrow{
    width:32px; height:32px; border-radius:10px;
    background:linear-gradient(135deg,var(--coral),var(--gold));
    color:#fff; display:grid; place-items:center; font-weight:900;
    flex:0 0 auto; transform:scaleX(-1);
  }
  .section--biz .card .arrow{ background:linear-gradient(135deg,var(--teal),var(--leaf)); }
  .empty{
    background:rgba(255,255,255,.45);
    border:1px dashed rgba(58,31,63,.25);
    border-radius:20px; padding:14px 16px;
    color:#4b2f3a; opacity:.65; font-size:14px; font-weight:500;
  }
  .footer{ margin-top:24px; font-size:12px; color:#4b2f3a; opacity:.6;}
</style>
</head>
<body>
  <main class="wrap">
    <h1>Gal · Landing</h1>
    <p class="sub">דפי הזמנה, אירועים ועסק</p>
    <div class="section section--personal">
      <div class="section-h"><span class="dot" aria-hidden="true"></span>אישי</div>
      <ul>
        <li>
          <a class="card" href="/personal/gagler-30">
            <span class="t">גגלר 30 — Tropical Rooftop<small>06.06.2026 · פלורנטין</small></span>
            <span class="arrow" aria-hidden="true">←</span>
          </a>
        </li>
      </ul>
    </div>
    <div class="section section--biz">
      <div class="section-h"><span class="dot" aria-hidden="true"></span>עסקי</div>
      <ul>
        <li class="empty">בקרוב — כאן יופיעו דפי נחיתה עסקיים</li>
      </ul>
    </div>
    <div class="footer">private · share specific links only</div>
  </main>
</body>
</html>
